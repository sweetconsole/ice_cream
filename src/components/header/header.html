<header class="header" id="header">
	<div class="container">
		<div class="header__content">
			<a class="header__logo_link" href="/">
				<img class="header__logo" src="./image/logo.svg" alt="Ice" />
			</a>

			<nav class="header__navigation">
				<ul class="header__navigation_list">
					<li class="header__navigation_list_item">
						<a class="header__navigation_link" href="#home">Главная</a>
					</li>
					<li class="header__navigation_list_item">
						<a class="header__navigation_link" href="#how">Как мы готовим</a>
					</li>
					<li class="header__navigation_list_item">
						<a class="header__navigation_link" href="#products">Меню</a>
					</li>
					<li class="header__navigation_list_item">
						<a class="header__navigation_link" href="#contant">Контакты</a>
					</li>
				</ul>
			</nav>

			<button
				class="header__burger"
				onclick="viewMenu()"
				aria-label="Открыть меню с навигацией по сайту"
			>
				<img class="header__burger_icon" src="./image/burger.svg" alt="" />
			</button>

			<button class="button__fill header__button" onclick="viewPopUp('buyNow')">
				Купить
				<svg
					class="button__fill_arrow"
					width="12"
					height="12"
					viewBox="0 0 12 12"
					fill="none"
					xmlns="http://www.w3.org/2000/svg"
				>
					<path
						d="M4 2L8.95 6L4 10"
						stroke="currentColor"
						stroke-width="2"
						stroke-linecap="round"
						stroke-linejoin="round"
					/>
				</svg>
			</button>
		</div>
	</div>
</header>
