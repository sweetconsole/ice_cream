<div class="popup popup__buy_now" id="popUpBuyNow">
	<p class="popup__title popup__buy_now_title">Быстрый заказ</p>

	<div class="popup__buy_now_products">
		<div class="popup__buy_now_product">
			<div class="popup__buy_now_product_block_image">
				<img
					class="popup__buy_now_product_image"
					src="./image/product_icon_1.webp"
					alt=""
					loading="lazy"
				/>
				<div
					class="popup__buy_now_product_image_background popup__buy_now_product_image_background-green"
				></div>
			</div>

			<div
				class="popup__buy_now_product_block popup__buy_now_product_block-green"
				onclick="selectProduct('green', this)"
			>
				<p class="popup__buy_now_product_name">Шоколадное мороженое</p>
			</div>
		</div>

		<div class="popup__buy_now_product">
			<div class="popup__buy_now_product_block_image">
				<img
					class="popup__buy_now_product_image"
					src="./image/product_icon_2.webp"
					alt=""
					loading="lazy"
				/>
				<div
					class="popup__buy_now_product_image_background popup__buy_now_product_image_background-yellow"
				></div>
			</div>

			<div
				class="popup__buy_now_product_block popup__buy_now_product_block-yellow"
				onclick="selectProduct('yellow', this)"
			>
				<p class="popup__buy_now_product_name">Кофе со льдом</p>
			</div>
		</div>

		<div class="popup__buy_now_product">
			<div class="popup__buy_now_product_block_image">
				<img
					class="popup__buy_now_product_image"
					src="./image/product_icon_3.webp"
					alt=""
					loading="lazy"
				/>
				<div
					class="popup__buy_now_product_image_background popup__buy_now_product_image_background-pink"
				></div>
			</div>

			<div
				class="popup__buy_now_product_block popup__buy_now_product_block-pink"
				onclick="selectProduct('pink', this)"
			>
				<p class="popup__buy_now_product_name">Молочный коктель</p>
			</div>
		</div>
	</div>

	<form class="popup__buy_now_form">
		<input
			class="popup__input popup_buy_now_input"
			placeholder="Ваше имя"
			type="text"
			name="name"
		/>
		<input
			class="popup__input popup_buy_now_input"
			placeholder="Ваш номер телефона"
			type="tel"
			name="phone"
		/>

		<textarea
			class="popup__input popup__textarea"
			placeholder="Пожелания к заказу"
		></textarea>

		<button class="popup__buy_now_button button__fill" type="submit">
			Заказать
		</button>
	</form>

	<img
		class="popup__close"
		src="./image/close.svg"
		alt="Close"
		onclick="viewPopUp('buyNow')"
		loading="lazy"
	/>
</div>
