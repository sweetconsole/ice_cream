<div class="popup popup__how" id="popUpHow">
	<p class="popup__title popup__how_title">How it’s made?</p>

	<video class="popup__how_video" id="popUpHowVideo" controls>
		<source src="./video/video.mp4" type="video/mp4" />
		Ваш браузер не поддерживает просмотр видео
	</video>

	<p class="popup__description popup__how_description">
		Производство мороженого проходит несколько ключевых этапов: сбор
		ингредиентов, смешивание, пастеризация, гомогенизация, фризерование
		(насыщение воздухом), добавление наполнителей, закалка, упаковка, хранение
		при -18°C и доставка в рефрижераторах.
	</p>

	<img
		class="popup__close"
		src="./image/close.svg"
		alt="Close"
		onclick="viewPopUp('how')"
		loading="lazy"
	/>
</div>
