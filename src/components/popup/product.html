<div class="popup popup__products" id="popUpProduct">
	<p class="popup__title popup__products_title" id="popUpProductName"></p>

	<div class="popup__products_image_block">
		<img
			class="popup__products_image"
			id="popUpProductImage"
			src="./image/product_icon_1.webp"
			alt="Product Image"
			loading="lazy"
		/>
		<div
			class="popup__products_image_background popup__products_image_background-green"
			id="popUpImageBackground"
		></div>
	</div>

	<ul
		class="popup__products_nutritional_values"
		id="popUpProductNutritionalValues"
	>
		<li
			class="popup__product_nutritional_value popup__product_nutritional_value-green"
		>
			<div
				class="popup__product_nutritional_value_count popup__products_background-green"
				id="popUpProductKCal"
			>
				***
			</div>
			<p class="popup__product_nutritional_value_name">Ккал</p>
		</li>
		<li class="popup__product_nutritional_value">
			<div
				class="popup__product_nutritional_value_count popup__products_background-green"
				id="popUpProductProtein"
			>
				***
			</div>
			<p class="popup__product_nutritional_value_name">Белка</p>
		</li>
		<li class="popup__product_nutritional_value">
			<div
				class="popup__product_nutritional_value_count popup__products_background-green"
				id="popUpProductFats"
			>
				***
			</div>
			<p class="popup__product_nutritional_value_name">Жиров</p>
		</li>
		<li class="popup__product_nutritional_value">
			<div
				class="popup__product_nutritional_value_count popup__products_background-green"
				id="popUpProductCarbs"
			>
				***
			</div>
			<p class="popup__product_nutritional_value_name">Углев.</p>
		</li>
	</ul>

	<p class="popup__products_ingredients_title">Ингредиенты</p>

	<ul class="popup__products_ingredients" id="popUpProductIngredients">
		<li class="popup__products_ingredient">
			<p class="popup__products_ingredient_text">Error</p>
			<p class="popup__products_ingredient_text">Error</p>
		</li>
	</ul>

	<form class="popup__buy_now_form">
		<input
			class="popup__input popup_buy_now_input"
			placeholder="Ваше имя"
			type="text"
			name="name"
		/>
		<input
			class="popup__input popup_buy_now_input"
			placeholder="Ваш номер телефона"
			type="tel"
			name="phone"
		/>

		<textarea
			class="popup__input popup__textarea"
			placeholder="Ваши пожелания"
		></textarea>

		<button class="popup__buy_now_button button__fill" type="submit">
			Заказать!
		</button>
	</form>

	<img
		class="popup__close"
		src="./image/close.svg"
		alt="Close"
		onclick="viewPopUp('buyProduct')"
		loading="lazy"
	/>
</div>
